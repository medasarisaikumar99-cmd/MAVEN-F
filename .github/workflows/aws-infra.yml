name: AWS Infrastructure

on:
  push:
    branches: [AWS-Infrastructure]

env:
  AWS_REGION: us-east-1              
  ECR_REPOSITORY: simple-java-maven-app

jobs:
  build-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy from ECR and verify the app runs
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" | grep -qi "hello world"